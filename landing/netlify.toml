[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/downloads/SubPulse.dmg"
  [headers.values]
    Content-Type = "application/x-apple-diskimage"
    Content-Disposition = "attachment; filename=\"SubPulse.dmg\""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
